<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="">
    <script src="/js/api-config.js"></script>
    <title>Contact</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- NAV -->
<nav>
    <a href="/" class="logo">KABUUBI Industries<span>.</span></a>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/products">Our Cars</a></li>
        <li><a href="/myorders">Order Your EV</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
    <div class="nav-right">
        <span id="userGreeting" style="display:none"></span>
        <button id="logoutBtn" class="nav-hire" style="display:none; border:none; cursor:pointer;">Logout</button>
        <a href="/myorders" class="nav-hire" id="loginNavBtn">Login</a>
    </div>
</nav>

    <div class="social-container">

        <h2>Inquire here</h2>

        <div class="social-icons">

            <a href="https://twitter.com" target="_blank" class="twitter">
                <i class="fab fa-twitter"></i>
            </a>

            <a href="https://facebook.com" target="_blank" class="facebook">
                <i class="fab fa-facebook"></i>
            </a>

            <a href="https://instagram.com" target="_blank" class="instagram">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://linkedin.com" target="_blank" class="linkedin">
                <i class="fab fa-linkedin"></i>
            </a>

        </div>

    </div>

    <div class="contact-container">

        <!-- CONTACT FORM -->

        <div class="form-section">
            <form id="contactForm">

                <input type="text" name="name" placeholder="Your Name" required>

                <input type="email" name="email" placeholder="Your Email" required>

                <textarea name="message" placeholder="Message"></textarea>

                <button type="submit">Send</button>

            </form>

            <p id="successMessage"></p>

        </div>


        <!-- SAVED MESSAGES -->

        <div class="messages-section">

            <h2>Messages</h2>

            <div id="messagesList"></div>

        </div>

    </div>

    <script src="/js/script.js"></script>

</body>

</html>
