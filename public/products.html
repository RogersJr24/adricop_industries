<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="">
    <script src="/js/env.js?v=5"></script>
    <script src="/js/api-config.js?v=5"></script>
    <title>Our Cars — KABUUBI Industries</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/products.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- NAV -->
    <nav>
        <a href="/" class="logo">KABUUBI Industries<span>.</span></a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/products">Our Cars</a></li>
            <li><a href="/myorders">Order Your EV</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
        <a href="/myorders" class="nav-hire">Order Now</a>
    </nav>

    <div class="products-header">
        <h1>Our Electric Vehicles</h1>
        <p>Built for the future. Designed for you.</p>
    </div>

    <div class="cars-grid" id="carsGrid">
        <p class="loading">Loading cars...</p>
    </div>

    <script>

        function resolveRailsApiUrl(path) {
            var p = path.charAt(0) === "/" ? path : "/" + path;
            var b = (typeof window.RAILWAY_API_BASE === "string" ? window.RAILWAY_API_BASE : "").trim();
            if (!b) {
                b = (typeof window.__API_BASE__ === "string" ? window.__API_BASE__ : "").trim();
            }
            if (!b) {
                return typeof apiUrl === "function" ? apiUrl(path) : p;
            }
            if (!/^https:\/\//i.test(b)) {
                b = "https://" + b.replace(/^\/+/, "");
            }
            return b.replace(/\/$/, "") + p;
        }

        fetch(resolveRailsApiUrl("/cars"))
        .then(function (res) {
            if (!res.ok) {
                throw new Error("HTTP " + res.status);
            }
            return res.json();
        })
        .then(data => {

            const grid = document.getElementById("carsGrid");

            if (data.length === 0) {
                grid.innerHTML = "<p class='loading'>No cars found.</p>";
                return;
            }

            let html = "";

            data.forEach(function (car) {

                html += `
                    <div class="car-card">
                        <div class="car-image-wrap">
                            <img src="${car.image_path}" alt="${car.model_name}" />
                        </div>
                        <div class="car-info">
                            <h3>${car.model_name}</h3>
                            <p>${car.description || "Description coming soon."}</p>
                            <a href="/myorders" class="car-btn">Order Now</a>
                        </div>
                    </div>
                `;

            });

            grid.innerHTML = html;

        })
        .catch(function (err) {
            var tried = resolveRailsApiUrl("/cars");
            document.getElementById("carsGrid").innerHTML =
                "<p class='loading'>Could not load cars. Tried: <code>" +
                String(tried).replace(/</g, "&lt;") +
                "</code>. Set <code>RAILWAY_API_BASE</code> in <code>js/env.js</code>, redeploy Firebase, hard-refresh (Ctrl+Shift+R). Railway: <code>CLIENT_URL</code> = your <code>*.web.app</code> URLs. See console (F12).</p>";
            console.error("[cars]", err, "URL:", tried);
        });

    </script>

</body>
</html>
